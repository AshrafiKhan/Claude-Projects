<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Projects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #0a0a0a;
      max-width: 760px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.375rem; }
    .tagline { color: #666; font-size: 0.9375rem; margin-bottom: 3rem; }
    .section-list { list-style: none; }
    .section-list li {
      border-top: 1px solid #e5e5e5;
      padding: 1.25rem 0;
    }
    .section-list li:last-child { border-bottom: 1px solid #e5e5e5; }
    .section-list a {
      font-size: 1.0625rem;
      font-weight: 600;
      text-decoration: none;
      color: #0a0a0a;
    }
    .section-list a:hover { text-decoration: underline; }
    .section-list small {
      display: block;
      color: #777;
      margin-top: 0.25rem;
      font-size: 0.8125rem;
    }
  </style>
</head>
<body>
  <h1>Claude Projects</h1>
  <p class="tagline">A growing collection of hero section patterns &mdash; plain HTML, CSS &amp; JS.</p>
  <ul class="section-list">
    <li>
      <a href="Rotating Gallery/">Rotating Gallery Hero</a>
      <small>Infinite-scroll image strip with serif headline and minimal nav.</small>
    </li>
  </ul>
</body>
</html>
